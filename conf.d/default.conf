	listen 80 default_server;
	listen [::]:80 default_server;

    root /www;

	# Old blog URLs → stuff
	location = /blog { return 301 /stuff/; }
	location = /blog/ { return 301 /stuff/; }
	location = /2024/05/15/rag.html { return 301 /stuff/healthcare-rag/; }
	location = /2024/07/11/fitnito.html { return 301 /stuff/fitnito/; }
	location = /2026/01/31/building-an-openclaw-plugin.html { return 301 /stuff/openclaw-plugin/; }
	location = /2026/02/05/fitify-launch.html { return 301 /stuff/fitify/; }
	location = /2026/02/07/heartbeat-agents-local-models.html { return 301 /stuff/local-model-heartbeats/; }
	location = /2026/02/16/voice-agent.html { return 301 /stuff/voice-agent/; }

	# Old work URL → things
	location = /work { return 301 /things/; }
